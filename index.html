<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Martín Fernández Navarro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
/* ════════════════════════════════════════════
   SHARED
════════════════════════════════════════════ */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{width:100vw;height:100vh;overflow:hidden;background:#04090f;font-family:'Share Tech Mono',monospace;}

/* ════════════════════════════════════════════
   DESKTOP (>680px)
════════════════════════════════════════════ */
@media(min-width:681px){
  #mobile-ui{display:none!important;}
  body{cursor:default;user-select:none;}

  #desktop{position:relative;width:100%;height:calc(100% - 38px);background:#0a1a28;overflow:hidden;}
  #wp-base{position:absolute;inset:0;width:100%;height:100%;z-index:0;display:block;object-fit:cover;}
  #desktop::before{content:'';position:absolute;inset:0;pointer-events:none;z-index:3;
    background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.04) 3px,rgba(0,0,0,.04) 4px);}
  #wp-ov{position:absolute;inset:0;z-index:1;opacity:0;pointer-events:none;transition:opacity .65s ease;}
  #wp-ov.vis{opacity:1;}
  #hp{position:absolute;z-index:45;pointer-events:none;opacity:0;transform:scale(.93) translateY(6px);
    transition:opacity .22s ease,transform .22s ease;border:1px solid rgba(255,255,255,.09);
    box-shadow:0 10px 36px rgba(0,0,0,.65);overflow:hidden;}
  #hp.vis{opacity:1;transform:scale(1) translateY(0);}
  #hp::before{content:'';position:absolute;inset:0;z-index:2;pointer-events:none;
    background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.05) 3px,rgba(0,0,0,.05) 4px);}
  .hp-footer{position:absolute;bottom:0;left:0;right:0;z-index:3;padding:7px 10px 6px;
    background:linear-gradient(0deg,rgba(0,0,0,.75) 0%,transparent 100%);}
  .hp-fname{font-size:9px;color:rgba(230,240,235,.7);letter-spacing:.4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .hp-ftype{font-size:7.5px;color:rgba(150,200,175,.4);letter-spacing:1px;margin-top:2px;text-transform:uppercase;}

  #icons{position:absolute;top:14px;left:14px;display:flex;flex-direction:column;gap:4px;z-index:10;}
  #papelera-wrap{position:absolute;bottom:52px;right:18px;z-index:10;}
  .dicon{display:flex;flex-direction:column;align-items:center;width:72px;padding:6px 4px 4px;
    border-radius:3px;cursor:pointer;position:relative;transition:background .15s;}
  .dicon:hover{background:rgba(255,255,255,.07);}
  .dicon.pulse{background:rgba(100,200,140,.08);}
  .dicon-fig{width:46px;height:40px;position:relative;flex-shrink:0;}
  .folder-body{position:absolute;bottom:0;left:0;width:46px;height:32px;border-radius:0 2px 2px 2px;}
  .folder-tab{position:absolute;top:0;left:0;width:20px;height:8px;border-radius:2px 2px 0 0;}
  .dicon-em{position:absolute;bottom:3px;right:2px;font-size:14px;line-height:1;}
  .dicon-label{margin-top:3px;font-size:9px;text-align:center;color:rgba(210,230,220,.8);
    text-shadow:0 1px 4px rgba(0,0,0,.95);line-height:1.25;word-break:break-word;max-width:70px;}
  .ring-svg{position:absolute;top:-3px;left:-3px;width:52px;height:46px;pointer-events:none;opacity:0;transition:opacity .3s;}
  .dicon:hover .ring-svg{opacity:1;}
  .ring-svg circle{fill:none;stroke:rgba(80,200,130,.5);stroke-width:1.5;stroke-dasharray:138;stroke-dashoffset:138;}
  .dicon.counting .ring-svg circle{stroke-dashoffset:0;transition:stroke-dashoffset 30s linear;}

  .win{position:absolute;background:rgba(9,14,20,.97);border:1px solid rgba(60,110,80,.28);
    border-radius:2px;display:flex;flex-direction:column;
    box-shadow:0 12px 40px rgba(0,0,0,.7);min-width:320px;min-height:180px;}
  .win.hidden{display:none;}
  .win.maxed{top:0!important;left:0!important;width:100%!important;height:100%!important;}
  .win-bar{display:flex;align-items:center;height:28px;padding:0 8px;gap:7px;
    background:rgba(12,18,26,.99);border-bottom:1px solid rgba(60,110,80,.2);
    border-radius:2px 2px 0 0;cursor:grab;flex-shrink:0;}
  .win-bar:active{cursor:grabbing;}
  .wbtn{width:11px;height:11px;border-radius:50%;border:none;cursor:pointer;flex-shrink:0;}
  .wbtn.cl{background:#8b2c2c;}.wbtn.mn{background:#6a5c00;}.wbtn.mx{background:#1a5a30;}
  .wbtn.cl:hover{background:#c0392b;}.wbtn.mn:hover{background:#d4ac00;}.wbtn.mx:hover{background:#27ae60;}
  .win-title{font-size:10px;color:rgba(180,210,195,.55);letter-spacing:.6px;flex:1;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}
  .win-tabs{display:flex;border-bottom:1px solid rgba(60,110,80,.2);background:rgba(10,16,14,.99);flex-shrink:0;}
  .win-tab{padding:6px 14px;font-size:9px;color:rgba(130,180,158,.45);cursor:pointer;border:none;background:transparent;border-bottom:2px solid transparent;letter-spacing:.8px;transition:color .15s,border-color .15s;}
  .win-tab:hover{color:rgba(155,205,180,.68);}
  .win-tab.on{color:rgba(180,230,205,.88);border-bottom-color:rgba(60,180,100,.5);}
  .win-body{flex:1;overflow-y:auto;overflow-x:hidden;padding:18px 20px;scrollbar-width:thin;scrollbar-color:rgba(60,110,80,.25) transparent;}
  .win-body::-webkit-scrollbar{width:3px;}
  .win-body::-webkit-scrollbar-thumb{background:rgba(60,110,80,.25);border-radius:2px;}
  .rh{position:absolute;bottom:0;right:0;width:12px;height:12px;cursor:se-resize;opacity:.25;}
  .rh::after{content:'◢';font-size:10px;color:rgba(80,160,110,.6);position:absolute;bottom:1px;right:1px;}
  .photo-win{min-width:unset!important;min-height:unset!important;animation:phIn .24s ease;}
  @keyframes phIn{from{opacity:0;transform:scale(.91) translateY(8px)}to{opacity:1;transform:none}}
  .photo-win .win-bar{height:22px;padding:0 5px;}
  .photo-body{flex:1;position:relative;overflow:hidden;}
  .photo-body::before{content:'';position:absolute;inset:0;pointer-events:none;z-index:1;
    background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.032) 3px,rgba(0,0,0,.032) 4px);}
  .ph-idx{position:absolute;bottom:6px;right:8px;z-index:2;font-size:8px;color:rgba(255,255,255,.22);letter-spacing:.6px;}

  #taskbar{position:fixed;bottom:0;left:0;right:0;height:38px;background:rgba(5,10,16,.99);
    border-top:1px solid rgba(45,90,60,.25);display:flex;align-items:center;z-index:2000;padding:0 6px;gap:5px;}
  .tb-start{height:26px;padding:0 10px;background:rgba(15,50,30,.35);border:1px solid rgba(60,120,80,.28);
    color:rgba(140,210,175,.7);font-size:10px;cursor:pointer;letter-spacing:1px;flex-shrink:0;}
  .tb-start:hover{background:rgba(20,65,40,.5);}
  .tb-sep{width:1px;height:20px;background:rgba(60,100,75,.18);flex-shrink:0;}
  #tb-wins{display:flex;gap:3px;flex:1;overflow:hidden;}
  .tb-wbtn{height:26px;padding:0 9px;background:rgba(10,18,14,.8);border:1px solid rgba(50,90,65,.18);
    color:rgba(155,200,178,.6);font-size:9.5px;cursor:pointer;white-space:nowrap;max-width:150px;overflow:hidden;text-overflow:ellipsis;}
  .tb-wbtn:hover,.tb-wbtn.on{background:rgba(22,48,34,.85);border-color:rgba(60,120,85,.32);color:rgba(190,225,208,.85);}
  #tb-clock{font-size:10.5px;color:rgba(140,190,165,.5);padding:0 10px;flex-shrink:0;text-align:right;line-height:1.4;}
  .notif-d{position:fixed;bottom:50px;right:12px;background:rgba(8,14,12,.98);
    border:1px solid rgba(60,110,80,.28);border-left:2.5px solid rgba(50,180,100,.4);
    padding:9px 13px;font-size:9.5px;color:rgba(150,205,175,.75);max-width:230px;z-index:3000;line-height:1.55;
    box-shadow:0 4px 18px rgba(0,0,0,.55);animation:nin .3s ease;}
  @keyframes nin{from{transform:translateX(110%);opacity:0}to{transform:none;opacity:1}}
  @keyframes nout{from{opacity:1}to{transform:translateX(110%);opacity:0}}
  #ctx{position:fixed;background:rgba(7,13,11,.99);border:1px solid rgba(55,100,70,.3);z-index:4000;min-width:170px;box-shadow:3px 4px 14px rgba(0,0,0,.65);}
  .ctx-i{padding:6px 14px;font-size:10px;color:rgba(160,205,182,.75);cursor:pointer;}
  .ctx-i:hover{background:rgba(25,60,40,.5);}
  .ctx-d{height:1px;background:rgba(55,100,70,.18);margin:2px 0;}
}

/* ════════════════════════════════════════════
   SHARED PROJECT CONTENT STYLES
════════════════════════════════════════════ */
.p-type{font-size:8.5px;color:rgba(90,190,130,.55);letter-spacing:2px;text-transform:uppercase;margin-bottom:5px;}
.p-name{font-family:'Libre Baskerville',serif;font-size:20px;color:rgba(220,235,225,.92);font-weight:400;line-height:1.2;}
.p-year{font-size:9px;color:rgba(130,180,155,.35);margin-top:3px;margin-bottom:14px;}
.p-media{width:100%;aspect-ratio:16/9;background:rgba(0,0,0,.35);border:1px solid rgba(60,110,80,.12);
  margin-bottom:16px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;}
.p-media::before{content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(0deg,rgba(0,80,40,.02),rgba(0,80,40,.02) 2px,transparent 2px,transparent 8px);}
.p-media-inner{display:flex;flex-direction:column;align-items:center;gap:6px;
  font-size:9px;color:rgba(80,140,110,.35);text-align:center;}
.p-media-inner span{font-size:20px;opacity:.3;}
.p-desc{font-family:'Libre Baskerville',serif;font-style:italic;font-size:12.5px;
  color:rgba(185,210,198,.75);line-height:1.85;margin-bottom:14px;}
.p-loc{font-size:9px;color:rgba(90,180,130,.45);margin-bottom:12px;letter-spacing:.3px;}
.p-tags{display:flex;flex-wrap:wrap;gap:4px;}
.tag{padding:2px 7px;border:1px solid rgba(60,110,80,.25);font-size:8.5px;color:rgba(110,175,145,.55);letter-spacing:.8px;}
.extra-placeholder{font-size:9.5px;color:rgba(90,150,120,.35);line-height:1.8;letter-spacing:.3px;}
.extra-content{font-family:'Libre Baskerville',serif;font-size:12.5px;color:rgba(175,205,190,.7);line-height:1.9;}
.papelera-note{font-size:9px;color:rgba(180,120,100,.6);letter-spacing:.8px;line-height:1.7;
  border-left:2px solid rgba(180,80,60,.35);padding-left:10px;margin-bottom:18px;}
.papelera-proj{border:1px solid rgba(180,80,60,.18);padding:14px 16px;}
.papelera-proj .p-name{font-size:16px;color:rgba(210,185,175,.82);}
.papelera-proj .p-desc{color:rgba(175,155,148,.65);}
.sub-proj{border:1px solid rgba(60,110,80,.18);margin-bottom:8px;cursor:pointer;transition:border-color .15s;}
.sub-proj:hover{border-color:rgba(60,110,80,.38);}
.sub-header{display:flex;align-items:center;gap:10px;padding:10px 12px;}
.sub-em{font-size:18px;flex-shrink:0;}
.sub-info{flex:1;}
.sub-name{font-family:'Libre Baskerville',serif;font-size:14px;color:rgba(210,230,220,.85);}
.sub-meta{font-size:8.5px;color:rgba(90,160,130,.45);margin-top:2px;letter-spacing:.4px;}
.sub-arrow{font-size:8px;color:rgba(100,170,140,.4);flex-shrink:0;transition:transform .2s;}
.sub-proj.open .sub-arrow{transform:rotate(180deg);}
.sub-body{display:none;padding:10px 12px 12px;border-top:1px solid rgba(60,110,80,.12);
  font-family:'Libre Baskerville',serif;font-style:italic;font-size:12px;color:rgba(175,205,190,.7);line-height:1.8;}
.sub-proj.open .sub-body{display:block;}
.bio-name{font-family:'Libre Baskerville',serif;font-size:22px;color:rgba(225,238,230,.92);font-weight:400;margin-bottom:3px;}
.bio-sub{font-size:9px;color:rgba(90,180,130,.5);letter-spacing:2px;text-transform:uppercase;margin-bottom:18px;}
.bio-p{font-family:'Libre Baskerville',serif;font-size:12.5px;color:rgba(185,210,198,.75);line-height:1.85;margin-bottom:12px;}
.bio-hl{color:rgba(225,238,230,.88);font-style:italic;}
.bio-foot{font-size:9.5px;color:rgba(90,160,130,.4);margin-top:16px;line-height:1.8;}
.bio-link{color:rgba(90,190,140,.5);text-decoration:none;border-bottom:1px solid rgba(90,190,140,.25);}
.bio-link:hover{color:rgba(100,210,155,.7);}

/* Desktop shared small */
.wx-wrap{text-align:center;padding:4px;}
.wx-icon{font-size:30px;margin-bottom:4px;}
.wx-temp{font-family:'Libre Baskerville',serif;font-size:34px;color:rgba(210,235,220,.88);}
.wx-city{font-size:9px;color:rgba(90,170,130,.5);letter-spacing:2.5px;text-transform:uppercase;margin-top:3px;}
.wx-desc{font-size:9.5px;color:rgba(140,190,165,.4);margin-top:7px;line-height:1.6;}
.calc-sub{font-size:9px;color:rgba(90,160,120,.4);text-align:right;margin-bottom:8px;min-height:12px;}
.calc-disp{background:rgba(0,0,0,.3);border:1px solid rgba(60,110,80,.18);padding:8px 10px;text-align:right;
  font-size:20px;color:rgba(170,230,200,.88);min-height:44px;display:flex;align-items:center;justify-content:flex-end;margin-bottom:6px;overflow:hidden;}
.calc-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:3px;}
.cbtn{padding:8px 2px;background:rgba(12,20,16,.85);border:1px solid rgba(50,90,65,.2);color:rgba(155,205,178,.75);font-size:11px;cursor:pointer;}
.cbtn:hover{background:rgba(25,50,38,.9);}
.cbtn.op{color:rgba(90,200,140,.7);}
.cbtn.eq{background:rgba(15,60,35,.6);color:rgba(110,220,155,.8);}
.cbtn.span2{grid-column:span 2;}

/* ════════════════════════════════════════════
   MOBILE (≤680px)
════════════════════════════════════════════ */
@media(max-width:680px){
  #desktop,#taskbar{display:none!important;}

  #mobile-ui{
    position:fixed;inset:0;
    display:flex;flex-direction:column;
    background:#04090f;overflow:hidden;
  }

  /* Wallpaper */
  #mob-wp{
    position:absolute;inset:0;z-index:0;
    background:linear-gradient(160deg,#0a1628 0%,#04090f 55%,#061410 100%);
  }
  #mob-wp::before{
    content:'';position:absolute;inset:0;
    background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.03) 3px,rgba(0,0,0,.03) 4px);
    pointer-events:none;
  }

  /* Status bar */
  #mob-status{
    position:relative;z-index:10;
    display:flex;align-items:center;justify-content:space-between;
    padding:12px 18px 6px;height:44px;flex-shrink:0;
  }
  #mob-time-s{font-size:15px;color:rgba(220,235,225,.88);letter-spacing:.5px;font-weight:500;}
  #mob-status-icons{display:flex;align-items:center;gap:6px;}
  .mob-sig{display:flex;align-items:flex-end;gap:1.5px;}
  .mob-sig span{width:3px;background:rgba(200,225,215,.7);border-radius:1px;}
  .mob-sig span:nth-child(1){height:5px;}
  .mob-sig span:nth-child(2){height:8px;}
  .mob-sig span:nth-child(3){height:11px;}
  .mob-sig span:nth-child(4){height:14px;}
  .mob-wifi{font-size:13px;color:rgba(200,225,215,.7);}
  .mob-bat{font-size:13px;color:rgba(200,225,215,.7);}

  /* Notification drop zone */
  #mob-notif-zone{
    position:absolute;top:44px;left:0;right:0;z-index:200;
    display:flex;flex-direction:column;gap:6px;padding:0 12px;
    pointer-events:none;
  }
  .mob-notif{
    background:rgba(12,20,28,.94);
    border:1px solid rgba(60,110,80,.3);
    border-radius:14px;padding:10px 14px;
    display:flex;align-items:center;gap:10px;
    box-shadow:0 6px 24px rgba(0,0,0,.55);
    pointer-events:all;
    transform:translateY(-80px);opacity:0;
    transition:transform .35s cubic-bezier(.22,1,.36,1),opacity .3s ease;
  }
  .mob-notif.show{transform:translateY(0);opacity:1;}
  .mob-notif.hide{transform:translateY(-80px);opacity:0;}
  .mob-notif-icon{font-size:20px;flex-shrink:0;width:36px;height:36px;
    background:rgba(255,255,255,.06);border-radius:8px;display:flex;align-items:center;justify-content:center;}
  .mob-notif-body{flex:1;min-width:0;}
  .mob-notif-from{font-size:9px;color:rgba(90,180,130,.6);letter-spacing:1.2px;text-transform:uppercase;margin-bottom:2px;}
  .mob-notif-text{font-family:'Libre Baskerville',serif;font-size:13px;color:rgba(210,230,220,.85);line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .mob-notif-x{font-size:14px;color:rgba(130,170,150,.4);cursor:pointer;flex-shrink:0;padding:4px;}
  .mob-notif-x:hover{color:rgba(180,210,195,.7);}

  /* App grid */
  #mob-grid{
    flex:1;position:relative;z-index:5;
    display:grid;grid-template-columns:repeat(4,1fr);
    gap:6px;padding:16px 14px 10px;
    align-content:start;overflow-y:auto;
    scrollbar-width:none;
  }
  #mob-grid::-webkit-scrollbar{display:none;}

  .mob-app{
    display:flex;flex-direction:column;align-items:center;gap:5px;
    cursor:pointer;padding:6px 2px;border-radius:12px;
    transition:background .15s;-webkit-tap-highlight-color:transparent;
  }
  .mob-app:active{background:rgba(255,255,255,.08);}
  .mob-app-icon{
    width:58px;height:58px;border-radius:14px;
    display:flex;align-items:center;justify-content:center;
    font-size:26px;flex-shrink:0;
    box-shadow:0 3px 12px rgba(0,0,0,.5);
    position:relative;overflow:hidden;
  }
  .mob-app-icon::after{
    content:'';position:absolute;inset:0;
    background:linear-gradient(145deg,rgba(255,255,255,.12) 0%,transparent 60%);
    border-radius:14px;
  }
  .mob-app-label{font-size:9px;color:rgba(215,228,222,.82);text-align:center;
    text-shadow:0 1px 4px rgba(0,0,0,.9);line-height:1.2;max-width:64px;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

  /* Dock */
  #mob-dock{
    position:relative;z-index:10;
    display:flex;justify-content:center;gap:14px;
    padding:10px 20px 20px;flex-shrink:0;
  }
  #mob-dock::before{
    content:'';position:absolute;inset:0;border-radius:24px 24px 0 0;
    background:rgba(255,255,255,.06);backdrop-filter:blur(12px);
    border-top:1px solid rgba(255,255,255,.1);
  }
  #mob-dock .mob-app{position:relative;z-index:1;}
  #mob-dock .mob-app-icon{width:54px;height:54px;}

  /* Full-screen project panel */
  #mob-panel{
    position:fixed;inset:0;z-index:500;
    background:rgba(9,14,20,.99);
    display:flex;flex-direction:column;
    transform:translateY(100%);transition:transform .38s cubic-bezier(.22,1,.36,1);
  }
  #mob-panel.open{transform:translateY(0);}

  #mob-panel-bar{
    display:flex;align-items:center;height:52px;padding:0 16px;gap:12px;
    background:rgba(12,18,26,.99);border-bottom:1px solid rgba(60,110,80,.2);
    flex-shrink:0;
  }
  #mob-panel-back{
    width:32px;height:32px;border:none;background:rgba(255,255,255,.07);
    border-radius:50%;color:rgba(180,220,200,.7);font-size:18px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;flex-shrink:0;
  }
  #mob-panel-title{font-size:11px;color:rgba(180,210,195,.6);letter-spacing:.6px;flex:1;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}

  #mob-panel-tabs{
    display:flex;border-bottom:1px solid rgba(60,110,80,.2);
    background:rgba(10,16,14,.99);flex-shrink:0;
  }
  .mob-tab{
    flex:1;padding:10px 4px;font-size:10px;letter-spacing:.8px;
    color:rgba(130,180,158,.45);cursor:pointer;border:none;background:transparent;
    border-bottom:2px solid transparent;transition:color .15s,border-color .15s;text-align:center;
  }
  .mob-tab.on{color:rgba(180,230,205,.88);border-bottom-color:rgba(60,180,100,.5);}

  #mob-panel-body{flex:1;overflow-y:auto;padding:20px 18px 40px;
    scrollbar-width:thin;scrollbar-color:rgba(60,110,80,.2) transparent;}
  #mob-panel-body .p-name{font-size:22px;}

  /* Handle bar */
  #mob-handle{
    height:28px;display:flex;align-items:center;justify-content:center;
    flex-shrink:0;cursor:pointer;
  }
  #mob-handle::after{content:'';width:36px;height:4px;background:rgba(255,255,255,.15);border-radius:2px;}
}
</style>

function createWallpaper(){
  const desk=document.getElementById('desktop');
  if(WALLPAPER_FILE){
    const ext=WALLPAPER_FILE.split('.').pop().toLowerCase();
    if(['gif','png','jpg','jpeg','webp'].includes(ext)){
      const img=document.createElement('img');img.id='wp-base';img.src=WALLPAPER_FILE;
      img.style.cssText='position:absolute;inset:0;width:100%;height:100%;z-index:0;object-fit:cover;';
      desk.insertBefore(img,desk.firstChild);
    }else{
      const vid=document.createElement('video');vid.id='wp-base';vid.autoplay=true;vid.loop=true;vid.muted=true;vid.playsInline=true;
      vid.style.cssText='position:absolute;inset:0;width:100%;height:100%;z-index:0;object-fit:cover;';
      vid.innerHTML=`<source src="${WALLPAPER_FILE}">`;desk.insertBefore(vid,desk.firstChild);
    }

  const desk=document.getElementById('desktop');

/* ── Drag ── */
let dragging=null,dx=0,dy=0,ox=0,oy=0;
function drag(win){
  const bar=win.querySelector('.win-bar');
  bar.addEventListener('mousedown',e=>{
    if(e.target.classList.contains('wbtn'))return;
    dragging=win;dx=e.clientX;dy=e.clientY;
    ox=parseInt(win.style.left)||win.getBoundingClientRect().left;
    oy=parseInt(win.style.top)||win.getBoundingClientRect().top;
    win.style.left=ox+'px';win.style.top=oy+'px';win.style.right='';
    focusW(win.id.replace('w-',''));e.preventDefault();
  });
  win.addEventListener('mousedown',()=>focusW(win.id.replace('w-','')));
}
document.addEventListener('mousemove',e=>{if(!dragging)return;dragging.style.left=(ox+e.clientX-dx)+'px';dragging.style.top=Math.max(0,oy+e.clientY-dy)+'px';});
document.addEventListener('mouseup',()=>{dragging=null;});

const CKEYS=[['C','±','%','÷'],['7','8','9','×'],['4','5','6','−'],['1','2','3','+'],['0','0','.','=']];
function openCalc(){
  if(WINS['calc']){focusW('calc');return;}
  mkWin('calc',`<div class="win-bar"><button class="wbtn cl" onclick="closeW('calc')"></button><button class="wbtn mn" onclick="minW('calc')"></button><div class="win-title">calculadora.exe</div></div>
    <div class="win-body" style="padding:10px"><div class="calc-sub" id="c-sub"></div>
    <div class="calc-disp" id="c-disp">0</div><div class="calc-grid">
    ${CKEYS.map(r=>r.map(k=>`<button class="cbtn ${k==='='?'eq ':['÷','×','−','+','C','±','%'].includes(k)?'op ':''} ${k==='0'?'span2':''}" onclick="cInput('${k}')">${k}</button>`).join('')).join('')}
    </div></div>`,210,310,14,260);
}
function cInput(k){
  const d=document.getElementById('c-disp'),s=document.getElementById('c-sub');if(!d)return;
  if(k==='C'){calcDisp='0';cE='';cR=false;}
  else if(k==='±'){calcDisp=calcDisp.startsWith('-')?calcDisp.slice(1):'-'+calcDisp;}
  else if(k==='%'){calcDisp=String(parseFloat(calcDisp)/100);}
  else if(k==='='){if(cE){try{const r=Function('"use strict";return('+cE.replace('×','*').replace('÷','/').replace('−','-')+calcDisp+')')();
    if(s)s.textContent=cE+calcDisp+'=';calcDisp=String(Math.round(r*1e10)/1e10);cE='';cR=true;}catch{calcDisp='error';cE='';}}}
  else if(['÷','×','−','+'].includes(k)){cE=calcDisp+k;calcDisp='0';cR=false;if(s)s.textContent=cE;}
  else{if(cR){calcDisp=k;cR=false;}else calcDisp=calcDisp==='0'?k:calcDisp+k;}
  d.textContent=calcDisp.slice(-12);
}

  'Sistema operativo: cuerpo + interfaz.','Depósito Cero — mayo 2026, Maldonado.',
  'Hacé doble clic sobre una carpeta.','[ señal intermitente ]','O esperá 30 seg. sobre un ícono.'];
let dnIdx=0;
function dNotif(msg){
  const n=document.createElement('div');n.className='notif-d';n.textContent=msg||DMSGS[dnIdx++%DMSGS.length];
  document.body.appendChild(n);
  setTimeout(()=>{n.style.animation='nout .3s ease forwards';setTimeout(()=>n.remove(),300);},4500);
}

/* ════════════════════════════════════════════
   MOBILE ENGINE
════════════════════════════════════════════ */
let mobPanelData=null;

function renderMobile(){
  renderMobGrid();
  renderMobDock();
  scheduleMobNotifs();
}

function renderMobGrid(){
  const grid=document.getElementById('mob-grid');if(!grid)return;
  PROJECTS.forEach(p=>{
    const app=mobApp(p.id,p.em,p.name,p.mobBg,()=>openMobPanel(p));
    grid.appendChild(app);
  });
  const pap=mobApp('papelera','🗑','Papelera','linear-gradient(145deg,#2a1818,#3e2020)',()=>openMobPapelera());
  grid.appendChild(pap);
}

function renderMobDock(){
  const dock=document.getElementById('mob-dock');if(!dock)return;
  const bio=mobApp('bio-dock','◻','about','linear-gradient(145deg,#1a2a20,#263a2c)',()=>openMobBio());
  dock.appendChild(bio);
}

function mobApp(id,em,label,bg,fn){
  const d=document.createElement('div');d.className='mob-app';
  d.innerHTML=`<div class="mob-app-icon" style="background:${bg}">${em}</div>
    <div class="mob-app-label">${label}</div>`;
  d.addEventListener('click',fn);
  return d;
}

/* ── Mobile panel ── */
function openMobPanel(p){
  mobPanelData=p;
  const panel=document.getElementById('mob-panel');
  const title=document.getElementById('mob-panel-title');
  const body=document.getElementById('mob-panel-body');
  if(!panel||!title||!body)return;

  title.textContent=p.name+' — '+p.year;

  let mainHTML,extraHTML;
  if(p.id==='colaboraciones'){
    mainHTML=colabsContent();
    extraHTML=`<div class="extra-placeholder">[ reflexiones y material extra sobre colaboraciones ]<br><br>Próximamente.</div>`;
  }else{
    mainHTML=projContent(p);
    extraHTML=p.extra&&p.extra.trim()
      ?`<div class="extra-content">${p.extra.replace(/\n/g,'<br>')}</div>`
      :`<div class="extra-placeholder">[ espacio para reflexiones, links y material complementario ]<br><br>Próximamente.</div>`;
  }

  body.innerHTML=`<div data-tab="main">${mainHTML}</div>
    <div data-tab="extra" style="display:none">${extraHTML}</div>`;

  /* reset tabs */
  panel.querySelectorAll('.mob-tab').forEach((b,i)=>{b.classList.toggle('on',i===0);});

  panel.classList.add('open');
  document.body.style.overflow='hidden';
}

function openMobPapelera(){
  const panel=document.getElementById('mob-panel');
  const title=document.getElementById('mob-panel-title');
  const body=document.getElementById('mob-panel-body');
  if(!panel||!title||!body)return;
  title.textContent='🗑 Papelera de reciclaje';
  body.innerHTML=`<div data-tab="main">
    <div class="papelera-note">Este proyecto no pudo realizarse.<br>Razones políticas ligadas al genocidio en Gaza.</div>
    <div class="papelera-proj">
      <div class="p-type">${TOPOLOGIA.type}</div>
      <div class="p-name">${TOPOLOGIA.name}</div>
      <div class="p-year">${TOPOLOGIA.year}</div>
      <div class="p-desc" style="margin-top:10px">${TOPOLOGIA.desc}</div>
      <div class="p-loc" style="margin-top:10px">📍 ${TOPOLOGIA.loc}</div>
    </div>
  </div><div data-tab="extra" style="display:none"></div>`;
  panel.querySelectorAll('.mob-tab').forEach((b,i)=>{b.classList.toggle('on',i===0);});
  /* hide extra tab for papelera */
  const tabs=panel.querySelectorAll('.mob-tab');if(tabs[1])tabs[1].style.display='none';
  panel.classList.add('open');document.body.style.overflow='hidden';
}

function closeMobPanel(){
  const panel=document.getElementById('mob-panel');
  if(panel)panel.classList.remove('open');
  document.body.style.overflow='';
  /* restore extra tab */
  panel.querySelectorAll('.mob-tab').forEach(b=>b.style.display='');
}

function mobSwTab(btn,tab){
  const panel=document.getElementById('mob-panel');if(!panel)return;
  panel.querySelectorAll('.mob-tab').forEach(b=>b.classList.remove('on'));btn.classList.add('on');
  panel.querySelectorAll('#mob-panel-body [data-tab]').forEach(b=>{b.style.display=b.dataset.tab===tab?'':'none';});
}

/* ── Mobile notifications ── */
function scheduleMobNotifs(){
  MOB_NOTIFS.forEach(n=>{setTimeout(()=>showMobNotif(n),n.delay);});
}

function showMobNotif(n){
  const zone=document.getElementById('mob-notif-zone');if(!zone)return;
  const el=document.createElement('div');el.className='mob-notif';
  el.innerHTML=`<div class="mob-notif-icon">${n.icon}</div>
    <div class="mob-notif-body">
      <div class="mob-notif-from">${n.from}</div>
      <div class="mob-notif-text">${n.text}</div>
    </div>
    <div class="mob-notif-x" onclick="dismissMobNotif(this.parentElement)">✕</div>`;
  zone.appendChild(el);
  el.style.pointerEvents='all';
  requestAnimationFrame(()=>requestAnimationFrame(()=>el.classList.add('show')));
  setTimeout(()=>dismissMobNotif(el),6000);
}

function dismissMobNotif(el){
  if(!el||el.classList.contains('hide'))return;
  el.classList.remove('show');el.classList.add('hide');
  setTimeout(()=>el.remove(),380);
}

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Martín Fernández Navarro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;user-select:none;}
body{width:100vw;height:100vh;overflow:hidden;background:#04090f;font-family:'Share Tech Mono',monospace;cursor:default;}

/* ── DESKTOP ── */
#desktop{
  position:relative;width:100%;height:calc(100% - 38px);
  background:#0a1a28;
  overflow:hidden;
}
/* wallpaper SVG base layer */
#wp-base{position:absolute;inset:0;width:100%;height:100%;z-index:0;display:block;}

/* scanlines — on top of everything, monitor feel */
#desktop::before{
  content:'';position:absolute;inset:0;pointer-events:none;z-index:3;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.04) 3px,rgba(0,0,0,0.04) 4px);
}

/* ── WALLPAPER OVERLAY ── */
#wp-ov{
  position:absolute;inset:0;z-index:1;
  opacity:0;pointer-events:none;
  transition:opacity .65s ease;
}
#wp-ov.vis{opacity:1;}

/* ── HOVER PREVIEW ── */
#hp{
  position:absolute;z-index:45;pointer-events:none;
  opacity:0;transform:scale(.93) translateY(6px);
  transition:opacity .22s ease, transform .22s ease;
  border:1px solid rgba(255,255,255,.09);
  box-shadow:0 10px 36px rgba(0,0,0,.65), 0 0 0 1px rgba(0,0,0,.3);
  overflow:hidden;
}
#hp.vis{opacity:1;transform:scale(1) translateY(0);}

/* scanline texture on preview */
#hp::before{
  content:'';position:absolute;inset:0;z-index:2;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.05) 3px,rgba(0,0,0,.05) 4px);
}

.hp-footer{
  position:absolute;bottom:0;left:0;right:0;z-index:3;
  padding:7px 10px 6px;
  background:linear-gradient(0deg,rgba(0,0,0,.75) 0%,rgba(0,0,0,.4) 70%,transparent 100%);
}
.hp-fname{
  font-family:'Share Tech Mono',monospace;font-size:9px;
  color:rgba(230,240,235,.7);letter-spacing:.4px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.hp-ftype{
  font-family:'Share Tech Mono',monospace;font-size:7.5px;
  color:rgba(150,200,175,.4);letter-spacing:1px;margin-top:2px;
  text-transform:uppercase;
}

/* ── ICONS ── */
#icons{
  position:absolute;top:14px;left:14px;
  display:flex;flex-direction:column;gap:4px;z-index:10;
}

.dicon{
  display:flex;flex-direction:column;align-items:center;
  width:72px;padding:6px 4px 4px;border-radius:3px;
  cursor:pointer;position:relative;
  transition:background .15s;
}
.dicon:hover{background:rgba(255,255,255,0.07);}
.dicon.pulse{background:rgba(100,200,140,0.08);}

.dicon-fig{width:46px;height:40px;position:relative;flex-shrink:0;}

.folder-body{
  position:absolute;bottom:0;left:0;width:46px;height:32px;
  border-radius:0 2px 2px 2px;
}
.folder-tab{
  position:absolute;top:0;left:0;width:20px;height:8px;border-radius:2px 2px 0 0;
}

.dicon-em{
  position:absolute;bottom:3px;right:2px;
  font-size:14px;line-height:1;
}

.dicon-label{
  margin-top:3px;font-size:9px;text-align:center;
  color:rgba(210,230,220,.8);
  text-shadow:0 1px 4px rgba(0,0,0,.95),0 0 10px rgba(0,0,0,.8);
  line-height:1.25;word-break:break-word;max-width:70px;
}

/* hover timer ring */
.ring-svg{
  position:absolute;top:-3px;left:-3px;width:52px;height:46px;
  pointer-events:none;opacity:0;transition:opacity .3s;
}
.dicon:hover .ring-svg{opacity:1;}
.ring-svg circle{
  fill:none;stroke:rgba(80,200,130,.5);stroke-width:1.5;
  stroke-dasharray:138;stroke-dashoffset:138;
}
.dicon.counting .ring-svg circle{
  stroke-dashoffset:0;transition:stroke-dashoffset 30s linear;
}

/* ── WINDOWS ── */
.win{
  position:absolute;
  background:rgba(9,14,20,.97);
  border:1px solid rgba(60,110,80,.28);
  border-radius:2px;
  display:flex;flex-direction:column;
  box-shadow:0 12px 40px rgba(0,0,0,.7),0 0 0 1px rgba(80,160,110,.06);
  min-width:320px;min-height:180px;
}
.win.hidden{display:none;}
.win.maxed{top:0!important;left:0!important;width:100%!important;height:100%!important;}

.win-bar{
  display:flex;align-items:center;height:28px;padding:0 8px;gap:7px;
  background:rgba(12,18,26,.99);
  border-bottom:1px solid rgba(60,110,80,.2);
  border-radius:2px 2px 0 0;cursor:grab;flex-shrink:0;
}
.win-bar:active{cursor:grabbing;}

.wbtn{width:11px;height:11px;border-radius:50%;border:none;cursor:pointer;flex-shrink:0;}
.wbtn.cl{background:#8b2c2c;}
.wbtn.mn{background:#6a5c00;}
.wbtn.mx{background:#1a5a30;}
.wbtn.cl:hover{background:#c0392b;}
.wbtn.mn:hover{background:#d4ac00;}
.wbtn.mx:hover{background:#27ae60;}

.win-title{
  font-size:10px;color:rgba(180,210,195,.55);
  font-family:'Share Tech Mono',monospace;letter-spacing:.6px;
  flex:1;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;
}

.win-body{
  flex:1;overflow-y:auto;overflow-x:hidden;padding:18px 20px;
  scrollbar-width:thin;scrollbar-color:rgba(60,110,80,.25) transparent;
}
.win-body::-webkit-scrollbar{width:3px;}
.win-body::-webkit-scrollbar-thumb{background:rgba(60,110,80,.25);border-radius:2px;}

/* project content */
.p-type{font-size:8.5px;color:rgba(90,190,130,.55);letter-spacing:2px;text-transform:uppercase;margin-bottom:5px;}
.p-name{font-family:'Libre Baskerville',serif;font-size:20px;color:rgba(220,235,225,.92);font-weight:400;line-height:1.2;}
.p-year{font-size:9px;color:rgba(130,180,155,.35);letter-spacing:.5px;margin-top:3px;margin-bottom:14px;}

.p-media{
  width:100%;aspect-ratio:16/9;
  background:rgba(0,0,0,.35);
  border:1px solid rgba(60,110,80,.12);
  margin-bottom:16px;
  display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;
}
.p-media-inner{
  display:flex;flex-direction:column;align-items:center;gap:6px;
  font-family:'Share Tech Mono',monospace;font-size:9px;
  color:rgba(80,140,110,.35);text-align:center;
}
.p-media-inner span{font-size:20px;opacity:.3;}
/* animated scan in media placeholder */
.p-media::before{
  content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(0deg,rgba(0,80,40,.02),rgba(0,80,40,.02) 2px,transparent 2px,transparent 8px);
}

.p-desc{
  font-family:'Libre Baskerville',serif;font-style:italic;
  font-size:12.5px;color:rgba(185,210,198,.75);line-height:1.85;margin-bottom:14px;
}
.p-loc{font-size:9px;color:rgba(90,180,130,.45);font-family:'Share Tech Mono',monospace;margin-bottom:12px;letter-spacing:.3px;}
.p-tags{display:flex;flex-wrap:wrap;gap:4px;}
.tag{
  padding:2px 7px;border:1px solid rgba(60,110,80,.25);
  font-size:8.5px;color:rgba(110,175,145,.55);
  font-family:'Share Tech Mono',monospace;letter-spacing:.8px;
}

.rh{position:absolute;bottom:0;right:0;width:12px;height:12px;cursor:se-resize;opacity:.25;}
.rh::after{content:'◢';font-size:10px;color:rgba(80,160,110,.6);position:absolute;bottom:1px;right:1px;}

/* ── PHOTO WINDOWS ── */
.photo-win{min-width:unset!important;min-height:unset!important;animation:phIn .24s ease;}
@keyframes phIn{from{opacity:0;transform:scale(.91) translateY(8px)}to{opacity:1;transform:scale(1) translateY(0)}}
.photo-win .win-bar{height:22px;padding:0 5px;}
.photo-body{flex:1;position:relative;overflow:hidden;}
.photo-body::before{
  content:'';position:absolute;inset:0;pointer-events:none;z-index:1;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.032) 3px,rgba(0,0,0,0.032) 4px);
}
.ph-idx{
  position:absolute;bottom:6px;right:8px;z-index:2;
  font-family:'Share Tech Mono',monospace;font-size:8px;
  color:rgba(255,255,255,.22);letter-spacing:.6px;
}

/* bio window */
.bio-name{font-family:'Libre Baskerville',serif;font-size:22px;color:rgba(225,238,230,.92);font-weight:400;margin-bottom:3px;}
.bio-sub{font-size:9px;color:rgba(90,180,130,.5);font-family:'Share Tech Mono',monospace;letter-spacing:2px;text-transform:uppercase;margin-bottom:18px;}
.bio-p{font-family:'Libre Baskerville',serif;font-size:12.5px;color:rgba(185,210,198,.75);line-height:1.85;margin-bottom:12px;}
.bio-hl{color:rgba(225,238,230,.88);font-style:italic;}
.bio-foot{font-size:9.5px;font-family:'Share Tech Mono',monospace;color:rgba(90,160,130,.4);margin-top:16px;line-height:1.7;}
.bio-link{color:rgba(90,190,140,.5);text-decoration:none;border-bottom:1px solid rgba(90,190,140,.25);}
.bio-link:hover{color:rgba(100,210,155,.7);}

/* ── WEATHER POPUP ── */
.wx-wrap{text-align:center;padding:4px;}
.wx-icon{font-size:30px;margin-bottom:4px;}
.wx-temp{font-family:'Libre Baskerville',serif;font-size:34px;color:rgba(210,235,220,.88);}
.wx-city{font-size:9px;color:rgba(90,170,130,.5);letter-spacing:2.5px;text-transform:uppercase;font-family:'Share Tech Mono',monospace;margin-top:3px;}
.wx-desc{font-size:9.5px;color:rgba(140,190,165,.4);font-family:'Share Tech Mono',monospace;margin-top:7px;line-height:1.6;}

/* ── CALCULATOR ── */
.calc-disp{
  background:rgba(0,0,0,.3);border:1px solid rgba(60,110,80,.18);
  padding:8px 10px;text-align:right;
  font-family:'Share Tech Mono',monospace;font-size:20px;
  color:rgba(170,230,200,.88);min-height:44px;
  display:flex;align-items:center;justify-content:flex-end;
  margin-bottom:6px;letter-spacing:1px;overflow:hidden;
}
.calc-sub{font-size:9px;color:rgba(90,160,120,.4);text-align:right;margin-bottom:8px;font-family:'Share Tech Mono',monospace;min-height:12px;}
.calc-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:3px;}
.cbtn{
  padding:8px 2px;background:rgba(12,20,16,.85);
  border:1px solid rgba(50,90,65,.2);
  color:rgba(155,205,178,.75);font-family:'Share Tech Mono',monospace;font-size:11px;
  cursor:pointer;transition:background .1s;
}
.cbtn:hover{background:rgba(25,50,38,.9);}
.cbtn.op{color:rgba(90,200,140,.7);border-color:rgba(60,130,90,.25);}
.cbtn.eq{background:rgba(15,60,35,.6);color:rgba(110,220,155,.8);}
.cbtn.span2{grid-column:span 2;}

/* ── TASKBAR ── */
#taskbar{
  position:fixed;bottom:0;left:0;right:0;height:38px;
  background:rgba(5,10,16,.99);border-top:1px solid rgba(45,90,60,.25);
  display:flex;align-items:center;z-index:2000;padding:0 6px;gap:5px;
}
.tb-start{
  height:26px;padding:0 10px;
  background:rgba(15,50,30,.35);border:1px solid rgba(60,120,80,.28);
  color:rgba(140,210,175,.7);font-size:10px;font-family:'Share Tech Mono',monospace;
  cursor:pointer;letter-spacing:1px;flex-shrink:0;transition:background .15s;
}
.tb-start:hover{background:rgba(20,65,40,.5);}
.tb-sep{width:1px;height:20px;background:rgba(60,100,75,.18);flex-shrink:0;}
#tb-wins{display:flex;gap:3px;flex:1;overflow:hidden;}
.tb-wbtn{
  height:26px;padding:0 9px;
  background:rgba(10,18,14,.8);border:1px solid rgba(50,90,65,.18);
  color:rgba(155,200,178,.6);font-size:9.5px;font-family:'Share Tech Mono',monospace;
  cursor:pointer;white-space:nowrap;max-width:150px;overflow:hidden;
  text-overflow:ellipsis;transition:background .1s;
}
.tb-wbtn:hover,.tb-wbtn.on{background:rgba(22,48,34,.85);border-color:rgba(60,120,85,.32);color:rgba(190,225,208,.85);}
#tb-clock{
  font-family:'Share Tech Mono',monospace;font-size:10.5px;
  color:rgba(140,190,165,.5);padding:0 10px;flex-shrink:0;
  text-align:right;line-height:1.4;
}

/* ── NOTIFICATIONS ── */
.notif{
  position:fixed;bottom:50px;right:12px;
  background:rgba(8,14,12,.98);
  border:1px solid rgba(60,110,80,.28);border-left:2.5px solid rgba(50,180,100,.4);
  padding:9px 13px;font-family:'Share Tech Mono',monospace;font-size:9.5px;
  color:rgba(150,205,175,.75);max-width:230px;z-index:3000;line-height:1.55;
  box-shadow:0 4px 18px rgba(0,0,0,.55);
  animation:nin .3s ease;
}
@keyframes nin{from{transform:translateX(110%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes nout{from{transform:translateX(0);opacity:1}to{transform:translateX(110%);opacity:0}}

/* ── CONTEXT MENU ── */
#ctx{
  position:fixed;background:rgba(7,13,11,.99);
  border:1px solid rgba(55,100,70,.3);z-index:4000;min-width:170px;
  box-shadow:3px 4px 14px rgba(0,0,0,.65);
}
.ctx-i{padding:6px 14px;font-size:10px;color:rgba(160,205,182,.75);font-family:'Share Tech Mono',monospace;cursor:pointer;transition:background .1s;}
.ctx-i:hover{background:rgba(25,60,40,.5);}
.ctx-d{height:1px;background:rgba(55,100,70,.18);margin:2px 0;}

/* ── MOBILE NOTICE ── */
#mob{
  display:none;position:fixed;inset:0;background:#04090f;
  flex-direction:column;align-items:center;justify-content:center;
  z-index:9999;padding:30px;text-align:center;
}
@media(max-width:680px){#mob{display:flex;}#desktop,#taskbar{display:none;}}
.mob-t{font-family:'Libre Baskerville',serif;font-size:22px;color:rgba(220,235,225,.85);font-style:italic;margin-bottom:14px;}
.mob-s{font-family:'Share Tech Mono',monospace;font-size:10px;color:rgba(90,170,130,.5);letter-spacing:1.5px;line-height:1.8;}
</style>
</head>

<div id="mob">

<div id="desktop" oncontextmenu="showCtx(event)"></div>

<div id="taskbar">

  <div class="tb-sep"></div>
  <div id="tb-wins"></div>
  <div id="tb-clock"></div>
</div>

/* ─── CLOCK ─── */
function tick(){
  const n=new Date();
  const t=n.toLocaleTimeString('es-UY',{hour:'2-digit',minute:'2-digit'});
  const d=n.toLocaleDateString('es-UY',{weekday:'short',day:'numeric',month:'short'});
  document.getElementById('tb-clock').innerHTML=t+'<br>'+d;
}
tick();setInterval(tick,1000);

}

function mkIcon(proj){

let prevHideTO=null;

function showPrev(p){
  clearTimeout(prevHideTO);
  const hp=document.getElementById('hp');
  const wpov=document.getElementById('wp-ov');
  if(!hp||!wpov)return;

  /* size */
  hp.style.width=p.pw+'px';
  hp.style.height=p.ph+'px';

  /* visual — layered backgrounds */
  hp.style.background=p.prevBg+(p.prevExtra?','+p.prevExtra:'');

  /* label */
  hp.querySelector('.hp-fname').textContent=p.name;
  hp.querySelector('.hp-ftype').textContent=p.type;

  /* random position — avoid icon column (left 95px) + taskbar (bottom 38px) */
  const dW=document.getElementById('desktop').offsetWidth;
  const dH=document.getElementById('desktop').offsetHeight;
  const pad=18;
  const minX=100, maxX=dW-p.pw-pad;
  const minY=pad,  maxY=dH-p.ph-pad;
  hp.style.left=Math.max(minX,minX+Math.random()*(maxX-minX))+'px';
  hp.style.top= Math.max(minY,minY+Math.random()*(maxY-minY))+'px';

  /* show */
  hp.classList.add('vis');

  /* wallpaper */
  wpov.style.background=p.wpBg;
  wpov.classList.add('vis');
}

const CKEYS=[['C','±','%','÷'],['7','8','9','×'],['4','5','6','−'],['1','2','3','+'],['0','0','.',  '=']];

function openCalc(){
  if(WINS['calc']){focusW('calc');return;}
  const rows=CKEYS.map(row=>row.map((k,i)=>{
    const sp=(row==='0'&&i===1)?'span2':'';
    const cls=k==='='?'cbtn eq op':(['÷','×','−','+','C','±','%'].includes(k)?'cbtn op':'cbtn');
    if(row===CKEYS[4]&&i===1)return'';

  }).join('')).join('');

        const sp=(k==='0')?'span2':'';
        const cl=k==='='?'cbtn eq':(['÷','×','−','+','C','±','%'].includes(k)?'cbtn op':'cbtn');
        return`<button class="${cl} ${sp}" onclick="cInput('${k}')">${k}</button>`;
      }).join('')).join('')}

}

let cE='',cR=false;
function cInput(k){
  const d=document.getElementById('c-disp');
  const s=document.getElementById('c-sub');
  if(!d)return;
  if(k==='C'){cE='';calcDisp='0';cR=false;}
  else if(k==='±'){calcDisp=calcDisp.startsWith('-')?calcDisp.slice(1):'-'+calcDisp;}
  else if(k==='%'){calcDisp=String(parseFloat(calcDisp)/100);}
  else if(k==='='){
    if(cE){
      try{
        const expr=cE.replace('×','*').replace('÷','/').replace('−','-');
        const res=Function('"use strict";return('+expr+calcDisp+')')();
        if(s)s.textContent=cE+calcDisp+'=';
        calcDisp=String(Math.round(res*1e10)/1e10);
        cE='';cR=true;
      }catch{calcDisp='error';cE='';}
    }
  }else if(['÷','×','−','+'].includes(k)){
    cE=calcDisp+k;calcDisp='0';cR=false;
    if(s)s.textContent=cE;
  }else{
    if(cR){calcDisp=k;cR=false;}
    else calcDisp=calcDisp==='0'?k:calcDisp+k;
  }
  d.textContent=calcDisp.slice(-12);
}

/* ─── DRAG ─── */
let dragging=null,dx=0,dy=0,ox=0,oy=0;
function drag(win){
  const bar=win.querySelector('.win-bar');
  bar.addEventListener('mousedown',e=>{
    if(e.target.classList.contains('wbtn'))return;
    dragging=win;
    dx=e.clientX;dy=e.clientY;
    ox=parseInt(win.style.left)||win.getBoundingClientRect().left;
    oy=parseInt(win.style.top)||win.getBoundingClientRect().top;
    win.style.left=ox+'px';win.style.top=oy+'px';
    win.style.right='';
    focusW(win.id.replace('w-',''));
    e.preventDefault();
  });
  win.addEventListener('mousedown',()=>focusW(win.id.replace('w-','')));
}
document.addEventListener('mousemove',e=>{
  if(!dragging)return;
  const nx=ox+(e.clientX-dx);
  const ny=Math.max(0,oy+(e.clientY-dy));
  dragging.style.left=nx+'px';
  dragging.style.top=ny+'px';
});
document.addEventListener('mouseup',()=>{dragging=null;});

/* ─── RESIZE ─── */
let resizing=null,rsx=0,rsy=0,rsw=0,rsh=0;
function resize(win){
  const rh=win.querySelector('.rh');if(!rh)return;
  rh.addEventListener('mousedown',e=>{
    resizing=win;rsx=e.clientX;rsy=e.clientY;
    rsw=win.offsetWidth;rsh=win.offsetHeight;
    e.preventDefault();e.stopPropagation();
  });
}
document.addEventListener('mousemove',e=>{
  if(!resizing)return;
  resizing.style.width=Math.max(320,rsw+(e.clientX-rsx))+'px';
  resizing.style.height=Math.max(180,rsh+(e.clientY-rsy))+'px';
});
document.addEventListener('mouseup',()=>{resizing=null;});
